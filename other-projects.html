<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Other Projects — Combat & Systems Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --bg:        #0a0a0a;
    --panel:     #131313;
    --panel-2:   #191919;
    --line:      #272727;
    --line-soft: #1c1c1c;
    --text:      #f2f2f0;
    --text-dim:  #96938f;
    --text-faint:#5c5a57;
    --red:       #c81e2b;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  a{ color:inherit; text-decoration:none; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg); color:var(--text); font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }

  /* ============ TOPBAR (identica al resto del sito) ============ */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    height:64px; padding:0 32px;
    background:rgba(10,10,10,0.85);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .nav-brand{ display:flex; align-items:center; gap:12px; }
  .logo-mark{ width:26px; height:26px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .logo-mark svg, .logo-mark img{ width:100%; height:100%; display:block; object-fit:contain; }
  .nav-name{
    font-family:var(--font-display); font-weight:600; font-size:16px; letter-spacing:0.02em;
    color:var(--text); display:flex; align-items:center; gap:8px;
  }
  .nav-links{ display:flex; gap:32px; align-items:center; }
  .nav-links a{
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim); position:relative; padding:6px 2px; transition:color .2s ease;
  }
  .nav-links a::after{
    content:''; position:absolute; left:0; bottom:0; width:0; height:1px;
    background:var(--red); transition:width .25s ease;
  }
  .nav-links a:hover{ color:var(--text); }
  .nav-links a:hover::after{ width:100%; }

  main{ max-width:800px; margin:0 auto; padding:130px 28px 100px; }

  /* ============ PAGE TITLE ============ */
  .page-eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--text-faint); text-align:center; margin-bottom:10px;
  }
  .page-title{
    font-family:var(--font-display); font-weight:600; font-size:clamp(26px,3.6vw,36px);
    text-align:center; display:inline-block; padding-bottom:10px; border-bottom:1px solid var(--line);
    margin:0 auto 56px; width:100%;
  }
  .page-title-wrap{ display:flex; justify-content:center; }

  /* ============ TABLE OF CONTENTS ============ */
  .toc-wrap{ text-align:center; margin:0 0 88px; }
  .toc-heading{
    font-family:var(--font-mono); font-size:13px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--red); margin-bottom:18px;
  }
  .toc-hint{
    font-size:13px; color:var(--text-faint); max-width:480px; margin:0 auto 20px; line-height:1.6;
  }
  .toc-list{ list-style:none; display:inline-flex; flex-direction:column; gap:9px; text-align:left; }
  .toc-list li{ font-family:var(--font-mono); font-size:13.5px; color:var(--text-dim); }
  .toc-list li span{ color:var(--text-faint); margin-right:8px; }
  .toc-list a{ transition:color .2s ease; }
  .toc-list a:hover{ color:var(--red); }

  /* ============ ENTRY (mini progetto) ============ */
  .entry{ margin-bottom:96px; scroll-margin-top:100px; }
  .entry:last-child{ margin-bottom:0; }
  .entry-title-wrap{ display:flex; justify-content:center; }
  .entry-title{
    font-family:var(--font-display); font-weight:600; font-size:clamp(19px,2.4vw,24px);
    text-align:center; padding-bottom:8px; border-bottom:1px solid var(--line);
    margin:0 auto 24px;
  }

  /* ---- carosello ---- */
  .entry-carousel{
    position:relative; width:100%; aspect-ratio:16/9; border-radius:6px; overflow:hidden;
    background:var(--panel); border:1px solid var(--line); margin-bottom:14px;
  }
  .carousel-track-wrap{ position:absolute; inset:0; }
  .carousel-slide-media{
    position:absolute; inset:0; opacity:0; transition:opacity .45s ease;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .carousel-slide-media.active{ opacity:1; z-index:1; }
  .carousel-slide-media img, .carousel-slide-media video, .carousel-slide-media iframe{
    width:100%; height:100%; object-fit:cover; border:0;
  }
  .carousel-slide-media .placeholder-label{
    font-family:var(--font-mono); font-size:11px; color:var(--text-faint);
  }
  .carousel-nav-btn{
    position:absolute; top:50%; transform:translateY(-50%); z-index:2;
    width:38px; height:38px; border-radius:50%;
    background:rgba(10,10,10,0.55); border:1px solid rgba(255,255,255,0.25);
    color:#fff; font-size:16px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:border-color .2s ease, background .2s ease;
  }
  .carousel-nav-btn:hover{ border-color:var(--red); background:rgba(10,10,10,0.75); }
  .carousel-nav-btn.prev{ left:12px; }
  .carousel-nav-btn.next{ right:12px; }
  .carousel-dots{
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%); z-index:2;
    display:flex; gap:7px;
  }
  .carousel-dot{
    width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.35);
    border:none; padding:0; cursor:pointer; transition:background .2s ease, transform .2s ease;
  }
  .carousel-dot.active{ background:var(--red); transform:scale(1.25); }

  .entry-actions{ display:flex; justify-content:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .entry-btn{
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:0.05em; text-transform:uppercase;
    padding:10px 22px; border:1px solid var(--line); border-radius:4px; background:var(--panel);
    color:var(--text); transition:border-color .2s ease, color .2s ease, background .2s ease;
    cursor:pointer;
  }
  .entry-btn:hover{ border-color:var(--red); color:var(--red); background:var(--panel-2); }

  .entry-description{
    text-align:center; font-size:15px; line-height:1.7; color:var(--text-dim);
    max-width:560px; margin:0 auto 20px;
  }
  .entry-description strong{ color:var(--text); font-weight:700; }

  .entry-facts{ list-style:none; text-align:center; margin:0 auto 28px; max-width:520px; }
  .entry-facts li{ font-size:13.5px; color:var(--text); line-height:1.95; }
  .entry-facts li .fact-label{ color:var(--text-dim); }
  .entry-facts li .fact-label::after{ content:': '; }

  .entry-responsibilities{
    font-size:14px; line-height:1.75; color:var(--text-dim);
    max-width:600px; margin:0 auto;
  }
  .entry-responsibilities-label{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-faint); display:block; margin-bottom:10px;
  }
  .entry-responsibilities ul{ padding-left:20px; }
  .entry-responsibilities li{ margin-bottom:6px; }
  .entry-responsibilities strong{ color:var(--text); font-weight:700; }

  .empty-state{ text-align:center; padding:80px 20px; color:var(--text-dim); }
  .empty-state a{ color:var(--red); }

  footer{
    text-align:center; padding:32px; font-family:var(--font-mono); font-size:11px; color:var(--text-faint);
    border-top:1px solid var(--line);
  }
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html#home" class="nav-brand">
      <span class="logo-mark" id="brand-logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="#c81e2b" stroke-width="1.4"/>
          <path d="M12 8L12 16M8 12L16 12" stroke="#c81e2b" stroke-width="1.4"/>
        </svg>
      </span>
      <span class="nav-name" id="brand-name">Jace</span>
    </a>
    <nav class="nav-links">
      <a href="index.html#home">Home</a>
      <a href="index.html#projects">Projects</a>
      <a href="index.html#about">About Me</a>
      <a href="resume.html">Resumè</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </div>

  <main id="main-content">
    <!-- Generato via JS da data.otherProjects -->
  </main>

  <footer>© <span id="year"></span> Jace — Combat & Systems Designer</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  function slugify(str){
    return String(str || '')
      .toLowerCase().trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '');
  }

  function escapeHtml(str){
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* Stessa convenzione usata nelle pagine progetto: righe che iniziano con
     "- " diventano un elenco puntato, una riga vuota separa due paragrafi,
     **testo** diventa grassetto. */
  function formatRichText(str){
    if (!str) return '';
    const escaped = escapeHtml(str).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    const blocks = escaped.split(/\n\s*\n/);
    return blocks.map(block => {
      const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
      if (!lines.length) return '';
      const isList = lines.every(l => /^[-*•]\s+/.test(l));
      if (isList) {
        const items = lines.map(l => `<li>${l.replace(/^[-*•]\s+/, '')}</li>`).join('');
        return `<ul>${items}</ul>`;
      }
      return `<p>${lines.join('<br>')}</p>`;
    }).join('');
  }

  /* ============================================================
     DATI DI ESEMPIO (fallback)
     Usati se "data.json" non è raggiungibile (es. apri il file in locale
     con doppio click, senza server). Su hosting reale i contenuti veri
     di data.json li sostituiscono automaticamente. */
  const FALLBACK_OTHER_PROJECTS = [
    {
      title: "Half-Spies",
      media: [
        { type: "none" },
        { type: "none" },
        { type: "none" }
      ],
      trailerLabel: "Trailer",
      downloadUrl: "",
      downloadLabel: "Download",
      description: "Prototipo solo in UE5 ispirato a spy-thriller psicologici, esplorazione di meccaniche di infiltrazione e doppio gioco.",
      facts: [
        { label: "Genere del gioco", value: "Stealth prototype" },
        { label: "Piattaforme", value: "PC" },
        { label: "Il mio ruolo nel progetto", value: "Solo developer" },
        { label: "Tempo di sviluppo", value: "3 settimane" },
        { label: "Dimensione Team", value: "1 persona" },
        { label: "Nome Azienda/Team", value: "Progetto personale" }
      ],
      responsibilities: "- Level design del livello di prova\n- Sistema di stealth e detection\n- Blueprint per l'IA delle guardie"
    },
    {
      title: "Golem Rumble — Game Jam Build",
      media: [
        { type: "none" },
        { type: "none" }
      ],
      trailerLabel: "Trailer",
      downloadUrl: "",
      downloadLabel: "Download",
      description: "La build originale nata durante Global Game Jam, poi evoluta nel gioco completo pubblicato su Steam.",
      facts: [
        { label: "Genere del gioco", value: "1v1 Arena Brawler" },
        { label: "Piattaforme", value: "PC" },
        { label: "Il mio ruolo nel progetto", value: "Combat Designer" },
        { label: "Tempo di sviluppo", value: "48 ore (jam)" },
        { label: "Dimensione Team", value: "4 persone" },
        { label: "Nome Azienda/Team", value: "Villains Studio" }
      ],
      responsibilities: "- Prototipazione rapida del combat loop\n- Bilanciamento delle prime due masks giocabili\n- Playtest interni durante la jam"
    }
  ];

  async function loadOtherProjects(){
    try {
      const res = await fetch('data.json', { cache: 'no-store' });
      if (res.ok) {
        const json = await res.json();
        if (json.otherProjects && json.otherProjects.length) return json;
      }
    } catch (e) { /* data.json non raggiungibile: uso i dati di esempio */ }
    return { otherProjects: FALLBACK_OTHER_PROJECTS };
  }

  function mediaSlideHtml(media, isActive, label){
    media = media || { type: 'none' };
    const activeClass = isActive ? ' active' : '';
    if (media.type === 'image' && media.imageSrc) {
      return `<div class="carousel-slide-media${activeClass}"><img src="${media.imageSrc}" alt=""></div>`;
    }
    if (media.type === 'video' && media.videoSrc) {
      return `<div class="carousel-slide-media${activeClass}"><video muted loop playsinline autoplay><source src="${media.videoSrc}"></video></div>`;
    }
    if (media.type === 'youtube' && media.youtubeId) {
      return `<div class="carousel-slide-media${activeClass}"><img src="https://img.youtube.com/vi/${media.youtubeId}/hqdefault.jpg" alt=""></div>`;
    }
    return `<div class="carousel-slide-media${activeClass}"><span class="placeholder-label">${escapeHtml(label || 'MEDIA')}</span></div>`;
  }

  function initEntryCarousel(root, media){
    if (!media || media.length <= 1) return; // niente frecce/dot se c'è 0 o 1 slide
    const track = root.querySelector('.carousel-track-wrap');
    const slides = Array.from(track.querySelectorAll('.carousel-slide-media'));
    const dots = Array.from(root.querySelectorAll('.carousel-dot'));
    let current = 0;
    let autoplayTimer = null;
    const AUTOPLAY_MS = 4000;
    const RESUME_AFTER_MANUAL_MS = 8000;

    function show(i){
      current = (i + slides.length) % slides.length;
      slides.forEach((s, idx) => s.classList.toggle('active', idx === current));
      dots.forEach((d, idx) => d.classList.toggle('active', idx === current));
    }
    function startAutoplay(){
      stopAutoplay();
      autoplayTimer = setInterval(() => show(current + 1), AUTOPLAY_MS);
    }
    function stopAutoplay(){
      if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
    }
    function manualNav(i){
      show(i);
      stopAutoplay();
      setTimeout(startAutoplay, RESUME_AFTER_MANUAL_MS);
    }

    root.querySelector('.carousel-nav-btn.prev').addEventListener('click', () => manualNav(current - 1));
    root.querySelector('.carousel-nav-btn.next').addEventListener('click', () => manualNav(current + 1));
    dots.forEach((d, idx) => d.addEventListener('click', () => manualNav(idx)));
    slides.forEach(s => s.addEventListener('click', () => manualNav(current + 1)));

    startAutoplay();
  }

  function renderEmptyState(main, message){
    main.innerHTML = `
      <div class="empty-state">
        <p>${escapeHtml(message)}</p>
        <p style="margin-top:14px"><a href="index.html#projects">← Torna ai progetti</a></p>
      </div>
    `;
  }

  (async function init(){
    const main = document.getElementById('main-content');
    const data = await loadOtherProjects();

    /* ---------- BRAND (logo + nome) ---------- */
    if (data.brand) {
      const brandLogo = document.getElementById('brand-logo');
      const brandName = document.getElementById('brand-name');
      if (brandName && data.brand.name) brandName.textContent = data.brand.name;
      if (brandLogo && data.brand.logoSrc) {
        brandLogo.innerHTML = `<img src="${data.brand.logoSrc}" alt="${data.brand.name || 'Logo'}">`;
      }
    }

    const entries = data.otherProjects || [];
    if (!entries.length) {
      renderEmptyState(main, 'Nessun progetto disponibile al momento.');
      return;
    }

    const tocHtml = entries.length > 1 ? `
      <div class="toc-wrap">
        <div class="toc-heading">Table of Content</div>
        <p class="toc-hint">Elenco numerato che cambia in base a quante sezioni si aggiungono a questa pagina: ogni voce corrisponde all'inizio della spiegazione di un progetto.</p>
        <ol class="toc-list">
          ${entries.map((e, i) => `<li><span>${String(i+1).padStart(2,'0')}</span><a href="#entry-${i}">${escapeHtml(e.title)}</a></li>`).join('')}
        </ol>
      </div>
    ` : '';

    const entriesHtml = entries.map((e, i) => {
      const media = e.media && e.media.length ? e.media : [{ type: 'none' }];
      const slidesHtml = media.map((m, mi) => mediaSlideHtml(m, mi === 0, e.title)).join('');
      const dotsHtml = media.length > 1
        ? `<div class="carousel-dots">${media.map((_, mi) => `<button class="carousel-dot${mi === 0 ? ' active' : ''}" type="button" aria-label="Vai all'immagine ${mi+1}"></button>`).join('')}</div>`
        : '';
      const navHtml = media.length > 1 ? `
        <button class="carousel-nav-btn prev" type="button" aria-label="Immagine precedente">‹</button>
        <button class="carousel-nav-btn next" type="button" aria-label="Immagine successiva">›</button>
      ` : '';

      const downloadUrl = e.downloadUrl || '';
      const trailerUrl = e.trailerUrl || '';
      const actionsHtml = (trailerUrl || downloadUrl) ? `
        <div class="entry-actions">
          ${trailerUrl ? `<a class="entry-btn" href="${trailerUrl}" target="_blank" rel="noopener">${escapeHtml(e.trailerLabel || 'Trailer')}</a>` : ''}
          ${downloadUrl ? `<a class="entry-btn" href="${downloadUrl}" target="_blank" rel="noopener">${escapeHtml(e.downloadLabel || 'Download')}</a>` : ''}
        </div>
      ` : '';

      const facts = (e.facts || []).filter(f => f && (f.value || f.label));
      const factsHtml = facts.length ? `<ul class="entry-facts">${facts.map(f => `<li><span class="fact-label">${escapeHtml(f.label)}</span>${escapeHtml(f.value)}</li>`).join('')}</ul>` : '';

      const responsibilitiesHtml = e.responsibilities ? `
        <div class="entry-responsibilities">
          <span class="entry-responsibilities-label">Responsabilità e cose fatte</span>
          ${formatRichText(e.responsibilities)}
        </div>
      ` : '';

      return `
        <div class="entry" id="entry-${i}">
          <div class="entry-title-wrap"><h2 class="entry-title">${escapeHtml(e.title)}</h2></div>
          <div class="entry-carousel" data-entry-index="${i}">
            <div class="carousel-track-wrap">${slidesHtml}</div>
            ${navHtml}
            ${dotsHtml}
          </div>
          ${actionsHtml}
          ${e.description ? `<div class="entry-description">${formatRichText(e.description)}</div>` : ''}
          ${factsHtml}
          ${responsibilitiesHtml}
        </div>
      `;
    }).join('');

    main.innerHTML = `
      <div class="page-eyebrow">Selected Work</div>
      <div class="page-title-wrap"><h1 class="page-title">Other Projects</h1></div>
      ${tocHtml}
      ${entriesHtml}
    `;

    document.querySelectorAll('.entry-carousel').forEach(root => {
      const idx = Number(root.dataset.entryIndex);
      initEntryCarousel(root, entries[idx].media);
    });
  })();
</script>
</body>
</html>
