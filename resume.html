<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumè — Combat & Systems Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --bg:        #0a0a0a;
    --panel:     #131313;
    --panel-2:   #191919;
    --line:      #272727;
    --text:      #f2f2f0;
    --text-dim:  #96938f;
    --text-faint:#5c5a57;
    --red:       #c81e2b;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  a{ color:inherit; text-decoration:none; }
  html, body{ height:100%; }
  body{
    background:var(--bg); color:var(--text); font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
  }

  /* ============ TOPBAR (identico al resto del sito) ============ */
  .topbar{
    flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between;
    height:64px; padding:0 32px;
    background:rgba(10,10,10,0.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .nav-brand{ display:flex; align-items:center; gap:12px; }
  .logo-mark{ width:26px; height:26px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .logo-mark svg{ width:100%; height:100%; display:block; }
  .nav-name{
    font-family:var(--font-display); font-weight:600; font-size:16px; letter-spacing:0.02em;
    color:var(--text); display:flex; align-items:center; gap:8px;
  }
  .nav-links{ display:flex; gap:32px; align-items:center; }
  .nav-links a{
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim); position:relative; padding:6px 2px; transition:color .2s ease;
  }
  .nav-links a::after{
    content:''; position:absolute; left:0; bottom:0; width:0; height:1px;
    background:var(--red); transition:width .25s ease;
  }
  .nav-links a:hover{ color:var(--text); }
  .nav-links a:hover::after{ width:100%; }
  .nav-links a.active{ color:var(--text); }
  .nav-links a.active::after{ width:100%; }

  /* ============ VIEWER ============ */
  .viewer-wrap{ flex:1; min-height:0; position:relative; }
  .viewer-wrap iframe{
    width:100%; height:100%; border:0; display:block; background:var(--panel);
  }
  .viewer-fallback{
    position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; text-align:center; padding:32px;
  }
  .viewer-fallback.show{ display:flex; }
  .viewer-fallback p{ color:var(--text-dim); font-size:14px; max-width:420px; line-height:1.6; }
  .viewer-fallback a{
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--text); border:1px solid var(--line); border-radius:4px; padding:12px 24px;
    transition:border-color .2s ease, color .2s ease;
  }
  .viewer-fallback a:hover{ border-color:var(--red); color:var(--red); }

  @media (max-width:640px){
    .topbar{ padding:0 18px; }
    .nav-links{ gap:16px; }
    .nav-links a:not(.active){ display:none; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html#home" class="nav-brand">
      <span class="logo-mark" id="brand-logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="#c81e2b" stroke-width="1.4"/>
          <path d="M12 8L12 16M8 12L16 12" stroke="#c81e2b" stroke-width="1.4"/>
        </svg>
      </span>
      <span class="nav-name" id="brand-name">Jace</span>
    </a>
    <nav class="nav-links">
      <a href="index.html#home">Home</a>
      <a href="index.html#projects">Projects</a>
      <a href="index.html#about">About Me</a>
      <a href="resume.html" class="active">Resumè</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </div>

  <div class="viewer-wrap">
    <iframe id="pdf-frame" title="Resumè"></iframe>
    <div class="viewer-fallback" id="pdf-fallback">
      <p id="pdf-fallback-text">Non è stato possibile visualizzare il PDF direttamente nel browser. Puoi comunque scaricarlo o aprirlo in una nuova scheda.</p>
      <a href="#" id="fallback-link" target="_blank" rel="noopener">Apri il PDF</a>
    </div>
  </div>

<script>
  const DEFAULT_RESUME_SRC = 'assets/resume.pdf';

  async function loadSiteData(){
    try {
      const res = await fetch('data.json', { cache: 'no-store' });
      if (res.ok) return await res.json();
    } catch (e) { /* data.json non raggiungibile: si prosegue con i default */ }
    return null;
  }

  /* Gli iframe spesso NON generano un evento "error" affidabile quando il
     PDF non esiste (mostrano solo una pagina vuota o l'errore del browser).
     Verifichiamo quindi prima, con una richiesta diretta, se il file esiste
     davvero: solo allora carichiamo l'iframe, altrimenti mostriamo subito
     un messaggio chiaro invece di lasciare la pagina vuota. */
  async function fileExists(src){
    try {
      const res = await fetch(src, { method: 'HEAD', cache: 'no-store' });
      if (res.ok) return true;
      // Alcuni host statici non supportano HEAD: riprova con GET.
      if (res.status === 405) {
        const res2 = await fetch(src, { cache: 'no-store' });
        return res2.ok;
      }
      return false;
    } catch (e) {
      return false;
    }
  }

  function showFallback(message){
    const frame = document.getElementById('pdf-frame');
    const fallback = document.getElementById('pdf-fallback');
    const fallbackText = document.getElementById('pdf-fallback-text');
    frame.style.display = 'none';
    if (message) fallbackText.textContent = message;
    fallback.classList.add('show');
  }

  (async function init(){
    const data = await loadSiteData();
    const src = (data && data.resume && data.resume.pdfSrc) || DEFAULT_RESUME_SRC;
    const frame = document.getElementById('pdf-frame');
    const fallbackLink = document.getElementById('fallback-link');

    /* ---------- BRAND (logo + nome) ---------- */
    if (data && data.brand) {
      const brandLogo = document.getElementById('brand-logo');
      const brandName = document.getElementById('brand-name');
      if (brandName && data.brand.name) brandName.textContent = data.brand.name;
      if (brandLogo && data.brand.logoSrc) {
        brandLogo.innerHTML = `<img src="${data.brand.logoSrc}" alt="${data.brand.name || 'Logo'}" style="width:100%;height:100%;object-fit:contain;">`;
      }
    }

    fallbackLink.href = src;

    const exists = await fileExists(src);
    if (!exists) {
      showFallback(`Il file "${src}" non è stato trovato. Controlla di averlo caricato nella cartella assets/ della repo con questo nome esatto (maiuscole/minuscole comprese).`);
      return;
    }

    frame.src = src;
    frame.addEventListener('error', () => showFallback());
  })();
</script>
</body>
</html>
