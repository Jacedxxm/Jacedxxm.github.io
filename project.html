<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progetto — Combat & Systems Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --bg:        #0a0a0a;
    --panel:     #131313;
    --panel-2:   #191919;
    --line:      #272727;
    --line-soft: #1c1c1c;
    --text:      #f2f2f0;
    --text-dim:  #96938f;
    --text-faint:#5c5a57;
    --cyan:      #c81e2b;
    --red:       #c81e2b;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  a{ color:inherit; text-decoration:none; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg); color:var(--text); font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }

  /* ============ TOPBAR (identico al sito principale) ============ */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    height:64px; padding:0 32px;
    background:rgba(10,12,15,0.85);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .nav-brand{ display:flex; align-items:center; gap:12px; }
  .logo-mark{ width:26px; height:26px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .logo-mark svg{ width:100%; height:100%; display:block; }
  .nav-name{
    font-family:var(--font-display); font-weight:600; font-size:16px; letter-spacing:0.02em;
    color:var(--text); display:flex; align-items:center; gap:8px;
  }
  .nav-links{ display:flex; gap:32px; align-items:center; }
  .nav-links a{
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim); position:relative; padding:6px 2px; transition:color .2s ease;
  }
  .nav-links a::after{
    content:''; position:absolute; left:0; bottom:0; width:0; height:1px;
    background:var(--red); transition:width .25s ease;
  }
  .nav-links a:hover{ color:var(--text); }
  .nav-links a:hover::after{ width:100%; }

  main{ max-width:960px; margin:0 auto; padding:130px 28px 100px; }

  /* ============ PROJECT HEADER ============ */
  .project-eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--text-faint); text-align:center; margin-bottom:10px;
  }
  .project-title{
    font-family:var(--font-display); font-weight:600; font-size:clamp(28px,4vw,40px);
    text-align:center; display:inline-block; padding-bottom:10px; border-bottom:1px solid var(--line);
    margin:0 auto 40px; width:100%;
  }
  .project-title-wrap{ display:flex; justify-content:center; }

  /* ============ TRAILER ============ */
  .trailer-box{
    position:relative; width:100%; aspect-ratio:16/9; border-radius:6px; overflow:hidden;
    background:var(--panel); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .trailer-box img, .trailer-box video, .trailer-box iframe{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border:0;
  }
  .trailer-box .placeholder-label{
    font-family:var(--font-mono); font-size:11px; color:var(--text-faint); letter-spacing:0.08em;
  }
  .play-btn{
    position:relative; z-index:2; width:64px; height:64px; border-radius:50%;
    background:rgba(10,12,15,0.55); border:1px solid rgba(255,255,255,0.35);
    display:flex; align-items:center; justify-content:center; transition:transform .2s ease, border-color .2s ease;
  }
  .trailer-box:hover .play-btn{ transform:scale(1.08); border-color:var(--cyan); }
  .play-btn svg{ width:22px; height:22px; margin-left:3px; fill:#fff; }

  .trailer-actions{ display:flex; justify-content:center; gap:14px; margin:20px 0 44px; flex-wrap:wrap; }
  .trailer-btn{
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
    padding:12px 26px; border:1px solid var(--line); border-radius:4px; background:var(--panel);
    color:var(--text); transition:border-color .2s ease, color .2s ease, background .2s ease;
    cursor:pointer;
  }
  .trailer-btn:hover{ border-color:var(--cyan); color:var(--cyan); background:var(--panel-2); }
  .trailer-btn--download:hover{ border-color:var(--red); color:var(--red); }

  /* ============ DESCRIPTION + FACTS ============ */
  .project-description{
    text-align:center; font-size:18px; line-height:1.75; color:var(--text-dim);
    max-width:680px; margin:0 auto 36px;
  }
  .project-description strong, .section-text strong{ color:var(--text); font-weight:700; }
  .project-description ul{
    text-align:left; display:inline-block; margin:10px auto 0; padding-left:22px;
  }
  .project-description ul li{ margin-bottom:8px; }
  .fact-list{ list-style:none; text-align:center; margin:0 auto 64px; max-width:620px; }
  .fact-list li{
    font-size:16px; color:var(--text); line-height:2.1; position:relative; padding-left:0;
  }
  .fact-list li .fact-label{ color:var(--text-dim); }
  .fact-list li .fact-label::after{ content:': '; }

  /* ============ TABLE OF CONTENTS ============ */
  .toc-wrap{ text-align:center; margin:0 0 80px; }
  .toc-heading{
    font-family:var(--font-mono); font-size:14px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--cyan); margin-bottom:20px;
  }
  .toc-list{ list-style:none; display:inline-flex; flex-direction:column; gap:10px; text-align:left; }
  .toc-list li{ font-family:var(--font-mono); font-size:14.5px; color:var(--text-dim); }
  .toc-list li span{ color:var(--text-faint); margin-right:8px; }
  .toc-list a{ color:inherit; transition:color .2s ease; }
  .toc-list a:hover{ color:var(--cyan); }

  /* ============ SECTIONS ============ */
  .project-section{
    display:grid; grid-template-columns:1fr 1.1fr; gap:48px; align-items:center;
    margin-bottom:100px; scroll-margin-top:100px;
  }
  .project-section.reverse{ grid-template-columns:1.1fr 1fr; }
  .project-section.reverse .section-text{ order:2; }
  .project-section.reverse .section-media{ order:1; }
  .section-title{
    font-family:var(--font-display); font-weight:600; font-size:24px; margin-bottom:14px;
  }
  .section-text p{ font-size:16px; line-height:1.8; color:var(--text-dim); margin-bottom:12px; }
  .section-text ul{
    font-size:16px; line-height:1.8; color:var(--text-dim); padding-left:22px; margin-bottom:12px;
  }
  .section-text ul li{ margin-bottom:8px; }
  .section-media{
    position:relative; aspect-ratio:4/3; border-radius:6px; overflow:hidden;
    background:var(--panel); border:1px solid var(--line); min-height:280px;
    display:flex; align-items:center; justify-content:center;
  }
  .section-media img, .section-media video, .section-media iframe{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border:0;
  }
  .section-media .placeholder-label{
    font-family:var(--font-mono); font-size:12px; color:var(--text-faint); text-align:center; padding:16px;
  }

  @media (max-width:860px){
    .project-section, .project-section.reverse{ grid-template-columns:1fr; gap:24px; }
    .project-section.reverse .section-text{ order:1; }
    .project-section.reverse .section-media{ order:2; }
    .section-media{ min-height:220px; }
  }

  /* ============ PREV / NEXT NAV ============ */
  .project-nav{
    display:grid; grid-template-columns:1fr 1fr; border:1px solid var(--line); border-radius:6px;
    overflow:hidden; margin-top:40px;
  }
  .project-nav a{
    display:flex; align-items:center; gap:14px; padding:22px 26px;
    color:var(--text); background:var(--panel); transition:background .2s ease;
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.04em; text-transform:uppercase;
  }
  .project-nav a:hover{ background:var(--panel-2); }
  .project-nav .nav-prev{ border-right:1px solid var(--line); border-left:3px solid var(--line-soft); justify-content:flex-start; }
  .project-nav .nav-next{ border-right:3px solid var(--red); justify-content:flex-end; text-align:right; }
  .project-nav .nav-arrow{ font-size:16px; opacity:.8; }
  .project-nav.single{ grid-template-columns:1fr; }

  /* ============ EMPTY STATE ============ */
  .empty-state{ text-align:center; padding:80px 20px; color:var(--text-dim); }
  .empty-state a{ color:var(--cyan); }

  footer{
    text-align:center; padding:32px; font-family:var(--font-mono); font-size:11px; color:var(--text-faint);
    border-top:1px solid var(--line);
  }
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html#home" class="nav-brand">
      <span class="logo-mark" id="brand-logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="#c81e2b" stroke-width="1.4"/>
          <path d="M12 8L12 16M8 12L16 12" stroke="#c81e2b" stroke-width="1.4"/>
        </svg>
      </span>
      <span class="nav-name" id="brand-name">Jace</span>
    </a>
    <nav class="nav-links">
      <a href="index.html#home">Home</a>
      <a href="index.html#projects">Projects</a>
      <a href="index.html#about">About Me</a>
      <a href="resume.html">Resumè</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </div>

  <main id="main-content">
    <!-- Il contenuto viene generato via JS in base al parametro ?slug= nell'URL -->
  </main>

  <footer>© <span id="year"></span> Jace — Combat & Systems Designer</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  function slugify(str){
    return String(str || '')
      .toLowerCase().trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '');
  }

  function getParam(name){
    return new URLSearchParams(window.location.search).get(name);
  }

  function escapeHtml(str){
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* Trasforma un testo semplice in HTML supportando elenchi puntati ed
     interruzioni di riga, senza bisogno di scrivere HTML a mano in admin:
     - righe che iniziano con "- " o "* " diventano un elenco puntato <ul>
     - un rigo vuoto separa due paragrafi <p> distinti
     - un singolo a capo dentro lo stesso paragrafo diventa <br> */
  function formatRichText(str){
    if (!str) return '';
    const escaped = escapeHtml(str).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    const blocks = escaped.split(/\n\s*\n/);
    return blocks.map(block => {
      const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
      if (!lines.length) return '';
      const isList = lines.every(l => /^[-*•]\s+/.test(l));
      if (isList) {
        const items = lines.map(l => `<li>${l.replace(/^[-*•]\s+/, '')}</li>`).join('');
        return `<ul>${items}</ul>`;
      }
      return `<p>${lines.join('<br>')}</p>`;
    }).join('');
  }

  /* Costruisce il markup "statico" (cover/placeholder) di un blocco media,
     dato un oggetto { type: 'youtube'|'video'|'image'|'none', youtubeId, videoSrc, imageSrc }. */
  function mediaPreviewHtml(media, coverFallback, label){
    media = media || { type: 'none' };
    if (media.type === 'image' && media.imageSrc) {
      return `<img src="${media.imageSrc}" alt="">`;
    }
    if ((media.type === 'video' || media.type === 'youtube') && coverFallback) {
      return `<img src="${coverFallback}" alt="">`;
    }
    if (coverFallback) return `<img src="${coverFallback}" alt="">`;
    return `<span class="placeholder-label">${escapeHtml(label || 'MEDIA')}</span>`;
  }

  function activatePlayableMedia(container, media){
    if (media.type === 'youtube' && media.youtubeId) {
      container.innerHTML = `<iframe src="https://www.youtube.com/embed/${media.youtubeId}?autoplay=1&rel=0" title="Trailer" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      return true;
    }
    if (media.type === 'video' && media.videoSrc) {
      container.innerHTML = `<video controls autoplay playsinline><source src="${media.videoSrc}"></video>`;
      return true;
    }
    return false;
  }

  /* ============================================================
     DATI DI ESEMPIO (fallback)
     Se "data.json" non è raggiungibile (es. apri questo file con doppio
     click, senza server: molti browser bloccano il fetch di file locali
     per policy di sicurezza) viene usato questo contenuto di prova, così
     puoi comunque vedere e testare il template. Quando invece il sito è
     online (o aperto tramite un server locale) e "data.json" è raggiungibile,
     questi valori vengono sostituiti da quelli reali del tuo sito. */
  const FALLBACK_DATA = {
    projects: [
      { title: "Negative Edge", cover: "" },
      { title: "Roguelike Action Game", cover: "" }
    ],
    projectPages: [
      {
        title: "Negative Edge",
        trailer: { type: "youtube", youtubeId: "VrhL2W6CBlg", videoSrc: "", imageSrc: "" },
        trailerLabel: "Trailer",
        downloadUrl: "https://store.steampowered.com/",
        downloadLabel: "Download",
        description: "Sparatutto arena hardcore in terza persona con un twist narrativo: il giocatore è il villain.",
        facts: [
          { label: "Genere del gioco", value: "Third-person shooter arena" },
          { label: "Piattaforme", value: "PC (Steam)" },
          { label: "Il mio ruolo nel progetto", value: "Combat & Systems Designer" },
          { label: "Tempo di sviluppo", value: "In corso" },
          { label: "Dimensione Team", value: "15 persone" },
          { label: "Nome Azienda/Team", value: "Villains Studio" }
        ],
        sections: [
          {
            title: "Combat design",
            text: "Sistemi di combattimento pensati per essere leggibili prima ancora che bilanciati.\n\n- Telegraphing chiaro sulle mosse nemiche\n- Feedback immediato su danno inflitto e subito\n- Iterazione rapida tramite overlay di debug",
            media: { type: "none", youtubeId: "", videoSrc: "", imageSrc: "" }
          },
          {
            title: "Level design",
            text: "Arene costruite attorno al ritmo del combattimento, con percorsi che incoraggiano decisioni tattiche rapide e momenti di respiro tra un'ondata e l'altra.",
            media: { type: "none", youtubeId: "", videoSrc: "", imageSrc: "" }
          },
          {
            title: "Tooling di debug",
            text: "Overlay custom per visualizzare velocity e attack arc in tempo reale, usati per validare rapidamente il feeling del combattimento durante l'iterazione.",
            media: { type: "none", youtubeId: "", videoSrc: "", imageSrc: "" }
          }
        ]
      }
    ]
  };

  async function loadData(){
    try {
      const res = await fetch('data.json', { cache: 'no-store' });
      if (res.ok) {
        const json = await res.json();
        return Object.assign({}, FALLBACK_DATA, json);
      }
    } catch (e) { /* niente data.json, es. file aperto in locale: uso i dati di esempio */ }
    return FALLBACK_DATA;
  }

  function renderEmptyState(main, message){
    main.innerHTML = `
      <div class="empty-state">
        <p>${escapeHtml(message)}</p>
        <p style="margin-top:14px"><a href="index.html#projects">← Torna ai progetti</a></p>
      </div>
    `;
  }

  (async function init(){
    const main = document.getElementById('main-content');
    const data = await loadData();
    const slug = getParam('slug');

    /* ---------- BRAND (logo + nome) ----------
       Applicato subito, indipendentemente dal progetto trovato o meno,
       perché fa parte della topbar condivisa da tutto il sito. */
    if (data && data.brand) {
      const brandLogo = document.getElementById('brand-logo');
      const brandName = document.getElementById('brand-name');
      if (brandName && data.brand.name) brandName.textContent = data.brand.name;
      if (brandLogo && data.brand.logoSrc) {
        brandLogo.innerHTML = `<img src="${data.brand.logoSrc}" alt="${data.brand.name || 'Logo'}" style="width:100%;height:100%;object-fit:contain;">`;
      }
    }

    if (!data || !data.projects || !data.projects.length) {
      renderEmptyState(main, 'Contenuti non disponibili al momento.');
      return;
    }

    /* Il progetto "base" (titolo, tag, cover) viene sempre da data.projects.
       I dettagli della pagina (trailer, facts, sezioni) vengono da
       data.projectPages, associato tramite lo slug del titolo. */
    const pages = data.projectPages || [];
    const order = data.projects.map(p => slugify(p.title));

    let index = order.indexOf(slug);
    if (index === -1 && !slug && order.length) index = 0; // nessuno slug -> primo progetto
    if (index === -1) {
      renderEmptyState(main, 'Progetto non trovato.');
      return;
    }

    const baseProject = data.projects[index];
    const pageData = pages.find(pp => slugify(pp.title) === order[index]);

    if (!pageData) {
      renderEmptyState(main, `La pagina di dettaglio per "${baseProject.title}" non è stata ancora creata.`);
      return;
    }

    document.title = `${pageData.title || baseProject.title} — Combat & Systems Design`;

    /* ---------- TRAILER ---------- */
    const trailer = pageData.trailer || { type: 'none' };
    const trailerCover = trailer.type === 'image' ? '' : (baseProject.cover || '');
    const isPlayableTrailer = (trailer.type === 'youtube' && trailer.youtubeId) || (trailer.type === 'video' && trailer.videoSrc);

    const trailerInnerHtml = mediaPreviewHtml(trailer, trailerCover, baseProject.title);
    const playButtonHtml = isPlayableTrailer ? `
      <div class="play-btn">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    ` : '';

    const trailerBtnLabel = pageData.trailerLabel || 'Trailer';
    const downloadUrl = pageData.downloadUrl || '';
    const downloadLabel = pageData.downloadLabel || 'Download';

    /* ---------- FACTS ---------- */
    const facts = (pageData.facts || []).filter(f => f && (f.value || f.label));
    const factsHtml = facts.map(f => `<li><span class="fact-label">${escapeHtml(f.label)}</span>${escapeHtml(f.value)}</li>`).join('');

    /* ---------- SECTIONS + TOC ---------- */
    const sections = pageData.sections || [];
    const tocHtml = sections.length > 1 ? `
      <div class="toc-wrap">
        <div class="toc-heading">Table of Content</div>
        <ol class="toc-list">
          ${sections.map((s, i) => `<li><span>${String(i+1).padStart(2,'0')}</span><a href="#section-${i}">${escapeHtml(s.title)}</a></li>`).join('')}
        </ol>
      </div>
    ` : '';

    const sectionsHtml = sections.map((s, i) => {
      const media = s.media || { type: 'none' };
      const reverse = i % 2 === 1 ? ' reverse' : '';
      const mediaHtml = mediaPreviewHtml(media, '', s.title);
      return `
        <div class="project-section${reverse}" id="section-${i}">
          <div class="section-text">
            <div class="section-title">${escapeHtml(s.title)}</div>
            ${formatRichText(s.text)}
          </div>
          <div class="section-media" data-media='${JSON.stringify(media).replace(/'/g,"&#39;")}'>${mediaHtml}</div>
        </div>
      `;
    }).join('');

    /* ---------- PREV / NEXT ---------- */
    let navHtml = '';
    if (data.projects.length > 1) {
      const prevIndex = (index - 1 + data.projects.length) % data.projects.length;
      const nextIndex = (index + 1) % data.projects.length;
      navHtml = `
        <div class="project-nav">
          <a class="nav-prev" href="project.html?slug=${order[prevIndex]}">
            <span class="nav-arrow">◀</span> Progetto precedente
          </a>
          <a class="nav-next" href="project.html?slug=${order[nextIndex]}">
            Progetto successivo <span class="nav-arrow">▶</span>
          </a>
        </div>
      `;
    }

    main.innerHTML = `
      <div class="project-eyebrow">Project</div>
      <div class="project-title-wrap"><h1 class="project-title">${escapeHtml(pageData.title || baseProject.title)}</h1></div>

      <div class="trailer-box" id="trailer-box">
        ${trailerInnerHtml}
        ${playButtonHtml}
      </div>

      <div class="trailer-actions">
        ${isPlayableTrailer ? `<button class="trailer-btn" id="trailer-btn" type="button">${escapeHtml(trailerBtnLabel)}</button>` : ''}
        ${downloadUrl ? `<a class="trailer-btn trailer-btn--download" href="${downloadUrl}" target="_blank" rel="noopener">${escapeHtml(downloadLabel)}</a>` : ''}
      </div>

      ${pageData.description ? `<div class="project-description">${formatRichText(pageData.description)}</div>` : ''}
      ${factsHtml ? `<ul class="fact-list">${factsHtml}</ul>` : ''}

      ${tocHtml}

      ${sectionsHtml}

      ${navHtml}
    `;

    /* Attiva la riproduzione del trailer al click (sul box o sul bottone) */
    const trailerBox = document.getElementById('trailer-box');
    const trailerBtn = document.getElementById('trailer-btn');
    function playTrailer(){
      if (activatePlayableMedia(trailerBox, trailer)) {
        trailerBox.style.cursor = 'default';
      }
    }
    if (isPlayableTrailer) {
      trailerBox.addEventListener('click', playTrailer);
      if (trailerBtn) trailerBtn.addEventListener('click', (e) => { e.preventDefault(); playTrailer(); });
    } else {
      trailerBox.style.cursor = 'default';
    }

    /* Le section-media con video/youtube restano immagine statica cliccabile
       per aprire il contenuto in una nuova scheda, per mantenere la pagina leggera. */
    document.querySelectorAll('.section-media[data-media]').forEach(el => {
      let media;
      try { media = JSON.parse(el.dataset.media); } catch(e) { media = {}; }
      if (media.type === 'youtube' && media.youtubeId) {
        el.style.cursor = 'pointer';
        el.addEventListener('click', () => window.open(`https://www.youtube.com/watch?v=${media.youtubeId}`, '_blank'));
      } else if (media.type === 'video' && media.videoSrc) {
        el.innerHTML = `<video controls playsinline><source src="${media.videoSrc}"></video>`;
      }
    });
  })();
</script>
</body>
</html>
